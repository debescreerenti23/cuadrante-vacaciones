<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadrante Vacaciones</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
    <header>
        <span class="header-icon">📅</span>
        <h1>Gestión de Vacaciones <span>Las Terrazas de la Torre</span></h1>
        <p class="header-subtitle" id="frase-gestion">Planifica los turnos del equipo de inseguridad.</p>
    </header>

    <div class="search-box">
        <input type="text" id="nombre-empleado" placeholder="Nombre del vigilante...">
        <select id="select-mes">
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
        </select>
        <select id="select-quincena">
            <option value="q1">1ª Quincena (1-15)</option>
            <option value="q2">2ª Quincena (16-31)</option>
        </select>
        <button onclick="asignarVacaciones()">Asignar</button>
        <button onclick="copiarJSON()" style="background-color: var(--text-sec); margin-left: 10px;">
            📋 Copiar JSON para Guardar
        </button>
    </div>

    <div id="cuadrante-container" class="grid-cuadrante">
        </div>

    <footer id="footer-app">
        &copy; <span id="year"></span> - Seguridad Las Terrazas de la Torre - <span>javilindj</span>
    </footer>
</div>

<script src="main.js"></script>
</body>
</html>
